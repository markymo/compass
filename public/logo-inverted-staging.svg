<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 140">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800&amp;display=swap');
            .logo-text { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 76px; letter-spacing: -2px; }
            .box-bg { fill: #ffffff; }
            .box { fill: none; stroke: #9333ea; stroke-width: 11; stroke-miterlimit: 10; }
            .tick { fill: none; stroke: #9333ea; stroke-width: 14; stroke-linecap: butt; stroke-linejoin: miter; }
        </style>
    </defs>

    <!-- Box Border -->
    <polyline class="box" points="80,20 20,20 20,105 105,105 105,65" />
    <!-- Tick -->
    <polyline class="tick" points="40,65 65,90 100,20" />
    <!-- Text -->
    <text x="130" y="98" class="logo-text">
        <tspan fill="#9333ea">On</tspan><tspan fill="#ffffff">Pro</tspan>
    </text>
</svg>
